<include file="@layout/common.html" $title="Molécules — Carrousels">
  <div class="container mx-auto px-4 py-10">
    <include file="@mol/carousels/_all.html" />
  </div>



  <hr>


  <section>

    <div class="container mx-auto px-4 py-10">
      <h1 class="h1">Hors container</h1>
      <p class="caption">
        Il est souvent souhaité que les carousels utilisent toute la largeur de page. Voici un exemple d'implémentation.
      </p>
      <h2 class="h3 mt-6">carousel-photos</h2>
      <p class="caption text-base-content/60">Photos à défilement libre + lightbox ·
        <code class="code-inline">@mol/carousels/carousel-photos.html</code>
      </p>
    </div>

    <include file="@mol/carousels/carousel-photos.html" class="my-4">
      <template slot="slides">
        <div class="embla__slide ">
          <a class="lightbox h-full" href="https://picsum.photos/id/80/1200/800.webp" data-gallery="carousel-photos">
            <img class="h-full w-auto rounded-xl object-cover" src="https://picsum.photos/id/80/500/400.webp" alt="Photo 8" loading="lazy" decoding="async" />
          </a>
        </div>
        <div class="embla__slide ">
          <a class="lightbox h-full" href="https://picsum.photos/id/81/1200/800.webp" data-gallery="carousel-photos">
            <img class="h-full w-auto rounded-xl object-cover" src="https://picsum.photos/id/81/500/400.webp" alt="Photo 8" loading="lazy" decoding="async" />
          </a>
        </div>
      </template>
      <template slot="nav">
        <div class="container mx-auto px-4">
        <include file="@comp/carousel/nav/indicator-prev-next.html" />
        </div>
      </template>
    </include>
  </section>

</include>

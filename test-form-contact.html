<include file="@layout/common.html" $title="Contact">

    <!-- Hero de la page contact -->
    <section class="bg-base-200 border-b border-base-300">
        <div class="container mx-auto max-w-5xl px-4 py-16 md:py-24">
            <p class="legend mb-3">Contactez-nous</p>
            <h1 class="h1 mb-4">Une question ?<br>On vous répond.</h1>
            <p class="lead max-w-xl">Remplissez le formulaire ci-dessous et nous vous recontacterons dans les meilleurs délais.</p>
        </div>
    </section>

    <!-- Contenu principal : infos + formulaire -->
    <section class="container mx-auto max-w-5xl px-4 py-12 md:py-16">
        <div class="grid gap-12 md:grid-cols-3">

            <!-- Formulaire — affiché en premier sur mobile, à droite sur desktop -->
            <div class="md:col-span-2 md:order-2">
                <include file="@comp/web3-form/form-contact.html" />
            </div>

            <!-- Informations de contact — après le formulaire sur mobile, à gauche sur desktop -->
            <aside class="space-y-8 md:col-span-1 md:order-1">
                <div class="space-y-1">
                    <p class="legend">Adresse</p>
                    <p class="p-sm">12 rue de l'Innovation<br>75011 Paris</p>
                </div>
                <div class="space-y-1">
                    <p class="legend">Téléphone</p>
                    <a class="p-sm link link-hover" href="tel:+33123456789">+33 1 23 45 67 89</a>
                </div>
                <div class="space-y-1">
                    <p class="legend">E-mail</p>
                    <a class="p-sm link link-hover" href="mailto:contact@exemple.fr">contact@exemple.fr</a>
                </div>
                <div class="space-y-1">
                    <p class="legend">Horaires</p>
                    <p class="p-sm">Lundi – Vendredi<br>9h – 18h</p>
                </div>
            </aside>

        </div>
    </section>

</include>

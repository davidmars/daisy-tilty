<!---
  Molécule : grille photos responsive uniforme
  ─────────────────────────────────────────────
  Grille à 4 colonnes sur grand écran, sans positionnement fixe sur les items.
  Images carrées (aspect-square), sans bords arrondis.
  Usage : copier ce bloc et remplacer les URLs + textes alt.
-->

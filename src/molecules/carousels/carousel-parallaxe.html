<!---
  carousel-parallaxe.html — Carrousel de photos avec effet parallaxe + lightbox
  ────────────────────────────────────────────────────────────────────────────────
  Options Embla : loop, dragFree, parallax, parallaxFactor
  Usage : copier ce bloc et remplacer les URLs + textes alt.
-->
<div x-data="embla({loop: true, dragFree: true, parallax: true, parallaxFactor: 0.08})">
  <div class="embla__viewport h-[280px] md:h-[320px]">
    <div class="embla__container embla__container--gap h-full" style="--embla-slide-gap: 0.75rem;">

      <div class="embla__slide embla__slide--multi embla__slide--parallax">
        <a class="lightbox embla__parallax" href="https://picsum.photos/id/130/1400/900.webp" data-gallery="carousel-parallaxe">
          <span class="embla__parallax__layer">
            <img class="embla__parallax__img" src="https://picsum.photos/id/130/1400/1000.webp" alt="Parallaxe 1" loading="lazy" decoding="async" />
          </span>
        </a>
      </div>

      <div class="embla__slide embla__slide--multi embla__slide--parallax">
        <a class="lightbox embla__parallax" href="https://picsum.photos/id/140/1400/900.webp" data-gallery="carousel-parallaxe">
